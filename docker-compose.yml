# docker-compose.yml for MVP
# Note: runs with --reload and a backend volume mount for hot-reloading during development.
# The built Docker image is production-ready; this compose file is for local dev only.

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount a local data directory so the SQLite database persists across container restarts
      - ./data:/app/data
      - ./backend:/app/backend
    command: >
      sh -c "uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
